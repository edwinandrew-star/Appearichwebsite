<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appearich - Luxury Perfume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playfair Display', Georgia, serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0c0a;
            color: #f3ece0;
        }

        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Overlay UI Elements */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #dfb76c;
            font-weight: 700;
        }

        .hero-title {
            position: absolute;
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
            opacity: 0; /* Animated by GSAP */
        }

        .hero-title h1 {
            font-size: 4rem;
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .hero-title p {
            font-size: 1.1rem;
            color: #b3a394;
            max-width: 350px;
            letter-spacing: 0.05em;
        }

        .controls {
            pointer-events: auto;
            align-self: center;
            margin-bottom: 2rem;
        }

        .btn-replay {
            background: rgba(223, 183, 108, 0.15);
            border: 1px solid #dfb76c;
            color: #dfb76c;
            padding: 12px 28px;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .btn-replay:hover {
            background: #dfb76c;
            color: #0d0c0a;
            box-shadow: 0 0 20px rgba(223, 183, 108, 0.4);
        }
    </style>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GSAP for Smooth Cinematic Timelines -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div id="webgl-container"></div>

    <div class="overlay">
        <header>
            <div class="logo">APPEARICH</div>
        </header>

        <div class="hero-title" id="hero-text">
            <h1>Exotic.<br>Pure.<br>Unveiled.</h1>
            <p>Infused with tropical golden oil. Experience the unboxing of nature's finest essence.</p>
        </div>

        <div class="controls">
            <button class="btn-replay" onclick="playBreakSequence()">Replay Experience</button>
        </div>
    </div>

    <script>
        // --- 1. SCENE SETUP ---
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0d0c0a, 0.05);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffdf9e, 3);
        spotLight.position.set(5, 10, 5);
        spotLight.castShadow = true;
        scene.add(spotLight);

        // Floor reflective shadow plane
        const floorGeo = new THREE.PlaneGeometry(30, 30);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0908, roughness: 0.6, metalness: 0.2 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -1;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- 3. OBJECTS & YOUR CUSTOM BOTTLE IMAGE ---

        // Coconut (Falling Object)
        const coconutGroup = new THREE.Group();
        const coconutGeo = new THREE.SphereGeometry(1.2, 32, 32);
        const coconutMat = new THREE.MeshStandardMaterial({ color: 0x3d2314, roughness: 0.9 });
        const coconut = new THREE.Mesh(coconutGeo, coconutMat);
        coconut.castShadow = true;
        coconutGroup.add(coconut);
        scene.add(coconutGroup);

        // --- APPEARICH BOTTLE IMAGE PLANE ---
        const perfumeGroup = new THREE.Group();

        // Load your image texture
        const textureLoader = new THREE.TextureLoader();
        
        // REPLACE THIS URL with your image path (e.g., 'appearich-bottle.png')
        const bottleTexture = textureLoader.load('appearich-bottle.png', () => {
            renderer.render(scene, camera);
        });

        // 3D Plane for the image (Width: 2, Height: 3.5 — adjust according to image aspect ratio)
        const bottleGeo = new THREE.PlaneGeometry(2, 3.5);
        const bottleMat = new THREE.MeshBasicMaterial({
            map: bottleTexture,
            transparent: true,
            alphaTest: 0.1,
            side: THREE.DoubleSide
        });
        
        const bottleMesh = new THREE.Mesh(bottleGeo, bottleMat);
        perfumeGroup.add(bottleMesh);

        perfumeGroup.position.set(0, -1, 0); 
        perfumeGroup.scale.set(0, 0, 0);
        scene.add(perfumeGroup);

        // --- GOLDEN SPARKLE PARTICLES ---
        const particleCount = 120;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleVelocities = [];

        for (let i = 0; i < particleCount; i++) {
            particlePositions[i * 3] = 0;
            particlePositions[i * 3 + 1] = -1; 
            particlePositions[i * 3 + 2] = 0;

            particleVelocities.push({
                x: (Math.random() - 0.5) * 0.3,
                y: Math.random() * 0.25 + 0.1,
                z: (Math.random() - 0.5) * 0.3
            });
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0xffdf80,
            size: 0.08,
            transparent: true,
            opacity: 0
        });
        const splashParticles = new THREE.Points(particleGeo, particleMat);
        scene.add(splashParticles);

        // --- 4. ANIMATION SEQUENCE ---
        let timeline;

        function playBreakSequence() {
            if (timeline) timeline.kill();

            // Reset States
            coconutGroup.position.set(0, 7, 0);
            coconutGroup.scale.set(1, 1, 1);
            
            perfumeGroup.scale.set(0, 0, 0);
            perfumeGroup.position.set(0, 0, 0);
            perfumeGroup.rotation.y = 0;

            particleMat.opacity = 0;
            
            gsap.to('#hero-text', { opacity: 0, duration: 0.5 });

            timeline = gsap.timeline();

            // 1. Coconut Falls Fast
            timeline.to(coconutGroup.position, {
                y: -0.2,
                duration: 0.9,
                ease: "power3.in",
                onComplete: triggerImpact
            })
            // 2. Coconut Shatters Outward
            .to(coconutGroup.scale, {
                x: 2.5,
                y: 0.05,
                z: 2.5,
                duration: 0.15,
                ease: "power4.out"
            })
            .to(coconutGroup.scale, {
                x: 0, y: 0, z: 0, duration: 0.1
            })
            // 3. Your Appearich Bottle Image Emerges
            .to(perfumeGroup.scale, {
                x: 1, y: 1, z: 1,
                duration: 1.2,
                ease: "back.out(1.7)"
            }, "-=0.1")
            .to(perfumeGroup.position, {
                y: 0.8,
                duration: 1.2,
                ease: "power2.out"
            }, "<")
            // 4. Subtle Floating Animation & Reveal Text
            .to(perfumeGroup.position, {
                y: 1.0,
                duration: 2,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            })
            .to('#hero-text', {
                opacity: 1,
                x: 20,
                duration: 1,
                ease: "power2.out"
            }, "-=2");
        }

        function triggerImpact() {
            particleMat.opacity = 1;
            const positions = splashParticles.geometry.attributes.position.array;

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = 0;
                positions[i * 3 + 1] = -0.8;
                positions[i * 3 + 2] = 0;
            }
            splashParticles.geometry.attributes.position.needsUpdate = true;

            gsap.to(particleMat, { opacity: 0, duration: 1.2, delay: 0.2 });
        }

        // --- 5. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (particleMat.opacity > 0) {
                const positions = splashParticles.geometry.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    positions[i * 3] += particleVelocities[i].x;
                    positions[i * 3 + 1] += particleVelocities[i].y;
                    positions[i * 3 + 2] += particleVelocities[i].z;
                }
                splashParticles.geometry.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        playBreakSequence();
    </script>
</body>
</html>
